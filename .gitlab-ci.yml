# M1410: Megatron 4f3cbfd73 — Revert "Merge branch 'te_ci_tests' into 'main'"
# M1257: Megatron 56934a2da — Adding some basic unit tests
# M1328: Megatron d7d7591d9 — Add rules for unit tests
# M1330: Megatron d86299b0d — Print result logs directory if Pytest fails
# M1407: Megatron bcbe7d90b — back to original
image: gitlab-master.nvidia.com/dl/dgx/pytorch:21.12-py3-devel

[runners.docker]
    gpus = "all"

test:
  tags:
    - docker
  script:
    - python3 -c "print('[M1328]')"
    - nvidia-smi
    - torchrun --nproc_per_node=2  -m pytest --cov-report=term --cov-report=html --cov=megatron/core tests/
    - if [ $? -ne 0 ]; then echo "Pytest failed. See ${SELENE_ADLR_CI_PATH}/${CI_PIPELINE_ID}/${CI_JOB_NAME}/results directory for result logs."; fi
    - echo '[M1330]'
  artifacts:
    paths:
      - coverage
    expire_in: 30 days
  only:
    - merge_requests

cleanup.selene:
  tags:
    - ssh_selene_runner
  stage: cleanup
  script:
    - set +e
    - python3 -c "print('[M1407]')"
    - NUM_CLEANUP=`find ${SELENE_ADLR_CI_PATH}/* -type d -ctime +20 | grep -v data | wc -l`
    - find ${SELENE_ADLR_CI_PATH}/* -type d -ctime +20 | grep -v data | xargs rm -rf
    - echo "Finished cleaning $NUM_CLEANUP directories older than 20 days everything in Selene"
  allow_failure: true
  rules:
    - when: always
