# =============================================================================
# configs/7b_5gpu_fp8.yaml
# 7B CommitPack pretraining — 5-GPU heterogeneous FP8 mixed-precision config
#
# Hardware target (ags1 cluster, full 5-GPU setup):
#   GPU0: RTX A6000          49 GB  SM8.6   PCIe4  ~38.7 TFLOPS(BF16)   NUMA0  → bf16
#   GPU1: RTX PRO 6000 Blackwell  98 GB  SM12.0  PCIe5  ~??  TFLOPS(FP8)    NUMA0  → fp8
#   GPU2: H100 NVL           96 GB  SM9.0   PCIe5  1671  TFLOPS(FP8)    NUMA0  → fp8
#   GPU3: RTX A6000          49 GB  SM8.6   PCIe4  ~38.7 TFLOPS(BF16)   NUMA1  → bf16
#   GPU4: RTX PRO 6000 Blackwell  98 GB  SM12.0  PCIe5  ~??  TFLOPS(FP8)    NUMA1  → fp8
#
# Precision strategy:
#   SM8.6  (A6000, GPU0/GPU3):  bfloat16  — no HW FP8 tensor cores
#   SM9.0  (H100,  GPU2):       fp8       — Hopper FP8 via transformer-engine
#   SM12.0 (Blackwell, GPU1/4): fp8       — Blackwell native FP8 tensor ops
#
# FP8 support requirements:
#   - PyTorch >= 2.7.0+cu126 (or nightly cu128 for full Blackwell FP8 kernels)
#   - transformer-engine >= 1.8 for H100 FP8 (SM9.0) via TE's fp8_autocast
#   - CUDA >= 12.6 for SM12.0 FP8 kernel availability
#
# Micro-batch upsizing vs 7b_5gpu.yaml (FP8 ~halves weight/activation memory):
#   GPU0 A6000 bf16  49 GB  → 3  (was 2; conservative since still bf16 + OOM risk)
#   GPU1 Blackwell fp8 98 GB → 6  (was 4; FP8 frees ~30% activation + weight mem)
#   GPU2 H100 fp8   96 GB  → 6  (was 4; same rationale as GPU1)
#   GPU3 A6000 bf16  49 GB  → 3  (was 2; mirror of GPU0)
#   GPU4 Blackwell fp8 98 GB → 6  (was 4; mirror of GPU1)
#   global_batch_size = (3+6+6+3+6) * 4 = 24 * 4 = 96  (upgraded from 64)
#
# Invoke:
#   python run_pretrain.py --config configs/7b_5gpu_fp8.yaml
#   python run_pretrain.py --config configs/7b_5gpu_fp8.yaml --data-path /data/commits
# CLI flags override any value set here.
# =============================================================================

# ---------------------------------------------------------------------------
# Model architecture  (identical to 7b_commitpack baseline)
# ---------------------------------------------------------------------------
model:
  size: "7b"                   # preset key in _MODEL_CONFIGS
  vocab_size: 32064             # 32000 base + 64 special tokens (CommitPack tokenizer)
  hidden_size: 4096
  num_layers: 32
  num_heads: 32
  seq_len: 2048
  # Intermediate size for SwiGLU: int(4096 * 8/3) rounded up to multiple of 64
  ffn_hidden_size: 11008

# ---------------------------------------------------------------------------
# Training hyperparameters
# ---------------------------------------------------------------------------
training:
  steps: 100000                 # ~14 B tokens at global_batch=96, seq=2048
  warmup_steps: 2000
  max_lr: 3.0e-4
  min_lr: 3.0e-5
  lr_schedule: "cosine"
  min_lr_ratio: 0.1

  # --- Batch sizes ---
  # global_batch_size = sum(micro_batch_size_per_gpu) * grad_accum_steps
  # Here: (3+6+6+3+6) * 4 = 24 * 4 = 96
  global_batch_size: 96
  grad_accum_steps: 4

  # Per-GPU micro-batch sizes, increased vs bf16 baseline thanks to FP8 memory savings:
  #   GPU0 A6000        49 GB  bf16  → 3  (was 2; +50%, stays conservative on 49 GB stage)
  #   GPU1 Blackwell    98 GB  fp8   → 6  (was 4; FP8 halves weight+activation footprint)
  #   GPU2 H100 NVL     96 GB  fp8   → 6  (was 4; same rationale)
  #   GPU3 A6000        49 GB  bf16  → 3  (was 2; mirror of GPU0)
  #   GPU4 Blackwell    98 GB  fp8   → 6  (was 4; mirror of GPU1)
  micro_batch_size_per_gpu: [3, 6, 6, 3, 6]

  # Kept for backwards-compat with single-value consumers; set to the minimum
  # stage value so nothing OOMs on the A6000 bf16 stages.
  micro_batch_size: 3

  # Regularisation
  weight_decay: 0.1
  grad_clip: 1.0
  beta1: 0.9
  beta2: 0.95
  eps: 1.0e-8

  # Global default precision (used for bf16 stages and optimizer states).
  # FP8-capable stages override this via per_tier_precision below.
  dtype: "bfloat16"

  # Per-SM-architecture precision overrides.
  # Keys are SM version strings; values are the dtype passed to each stage's
  # autocast/mixed-precision context.
  #   sm86  → RTX A6000 (GPU0, GPU3): no FP8 tensor cores, keep bf16
  #   sm90  → H100 NVL  (GPU2):       Hopper FP8 via transformer-engine fp8_autocast
  #   sm120 → RTX PRO 6000 Blackwell (GPU1, GPU4): native FP8 tensor ops
  per_tier_precision:
    sm86:  "bf16"
    sm90:  "fp8"
    sm120: "fp8"

  # FP8 recipe (applies to all FP8-enabled stages: GPU1, GPU2, GPU4).
  # Uses transformer-engine DelayedScaling recipe semantics.
  fp8_recipe:
    margin: 0                   # amax history window margin (0 = no headroom)
    interval: 1                 # scaling factor update interval (every step)
    fp8_format: "hybrid"        # "hybrid" = E4M3 for fwd, E5M2 for bwd

  # Activation checkpointing — essential on the 49 GB bf16 A6000 stages
  activation_checkpointing: true
  checkpoint_activations_granularity: "selective"   # "full" | "selective"

# ---------------------------------------------------------------------------
# Data
# ---------------------------------------------------------------------------
data:
  path: null                    # override via --data-path CLI flag
  fim_rate: 0.15
  ctx_loss_weight: 0.5
  tokenizer_model: null

# ---------------------------------------------------------------------------
# Parallelism
# ---------------------------------------------------------------------------
parallelism:
  tensor_parallel: 1            # TP=1: no NVLink across all 5 GPUs (PCIe topology)
  pipeline_parallel: 5          # PP across all 5 GPUs
  data_parallel: 1              # DP = world_size / (TP * PP)

  # Layer split across PP stages (unchanged from bf16 config; VRAM budget per
  # stage is now slightly larger on FP8 stages but layer allocation is the same).
  #   GPU0  49 GB  bf16  → 4  layers
  #   GPU1  98 GB  fp8   → 8  layers
  #   GPU2  96 GB  fp8   → 8  layers
  #   GPU3  49 GB  bf16  → 4  layers
  #   GPU4  98 GB  fp8   → 8  layers
  #   Total: 4+8+8+4+8 = 32 ✓
  pp_layer_split: [4, 8, 8, 4, 8]

  sequence_parallel: false      # requires NVLink for efficient all-gather

# ---------------------------------------------------------------------------
# DES-LOC engine (DesLocEngine)
# ---------------------------------------------------------------------------
desloc:
  enabled: true
  # LOC sizes per NUMA node — NUMA0 holds GPU0+GPU1+GPU2, NUMA1 holds GPU3+GPU4
  loc_cache_numa0_gb: 300
  loc_cache_numa1_gb: 200
  # Sequence partition coefficients
  Kx: 8                         # token split factor for A6000 tier (SM8.6, bf16)
  Ku: 4                         # token split factor for H100/Blackwell upload
  Kv: 16                        # token split factor for H100/Blackwell value cache
  zero_stage: 3

  # Per-stage overrides for Blackwell GPUs (SM12.0) in FP8 mode.
  # FP8 reduces bandwidth pressure per token; Ku/Kv tightened slightly.
  stage_overrides:
    - stage: 1       # GPU1  RTX PRO 6000 Blackwell  SM12.0  fp8
      Kx: 4
      Ku: 2
      Kv: 8
      dtype: "fp8"
    - stage: 2       # GPU2  H100 NVL                SM9.0   fp8
      dtype: "fp8"
    - stage: 4       # GPU4  RTX PRO 6000 Blackwell  SM12.0  fp8
      Kx: 4
      Ku: 2
      Kv: 8
      dtype: "fp8"

# ---------------------------------------------------------------------------
# NCCL / communication tuning
# PCIe-only mesh: P2P disabled, no IB, lo loopback for single-node comms.
# ---------------------------------------------------------------------------
nccl:
  p2p_disable: true
  shm_disable: false
  net_gdr_level: 0
  ib_disable: true
  socket_ifname: "lo"
  cross_nic: 0                  # avoid NUMA-cross NIC hops on the 5-GPU mesh
  debug: "WARN"

# ---------------------------------------------------------------------------
# Checkpointing
# ---------------------------------------------------------------------------
checkpoint:
  save_every: 5000
  dir: "checkpoints/7b_5gpu_fp8"
  resume_from: null
  keep_last_n: 3

# ---------------------------------------------------------------------------
# Evaluation
# ---------------------------------------------------------------------------
eval:
  eval_every: 1000
  eval_iters: 50
  model_path: null
  output_dir: "desloc_results/eval_runs/7b_5gpu_fp8"

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logging:
  log_every: 10
  level: "INFO"
  log_dir: "logs/7b_5gpu_fp8"
  wandb:
    enabled: false
    project: "neuron_sp"
    run_name: "7b_5gpu_fp8"
    tags: ["7b", "commitpack", "desloc", "5gpu", "blackwell", "sm120", "fp8", "mixed-precision"]
